<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search GitHub users and explore their public repositories — sorted, filtered, and bookmarkable."
    />
    <meta name="theme-color" content="#1E293B" />

    <!-- dark mode flash fix — React se pehle data-theme set hona chahiye -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('gh-explorer:theme');
          var theme = stored ? JSON.parse(stored) : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>

    <!-- non-blocking font load — print/all swap trick -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>GitHub Explorer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
